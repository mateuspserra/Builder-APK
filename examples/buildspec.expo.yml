name: expo-debug
timeoutMinutes: 30
network: true
environment:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
steps:
  - name: Install dependencies
    run: npm ci
  - name: Prebuild Expo
    run: npx expo prebuild --platform android
  - name: Build APK
    run: cd android && ./gradlew clean assembleDebug
artifacts:
  - android/app/build/outputs/apk/debug/*.apk
